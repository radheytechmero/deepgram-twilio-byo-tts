<body>
    <h1>Deepgram Audio Client</h1>
    <button id="startBtn">Start Audio</button>
    <button id="stopBtn" disabled>Stop Audio</button>
    <p>Status: <span id="status">Disconnected</span></p>

    <script>
        let mediaRecorder;
        let audioChunks = [];

        let ws = null;
        let audioContext = null;
        let audioQueue = [];
        let isPlaying = false;
        let nextTime = 0; // Tracks when the next buffer should start
        const SAMPLE_RATE = 24000; // Matches server configuration (24kHz)

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusEl = document.getElementById('status');



        // Call the function to request microphone access, for example, on a button click
        // document.getElementById('enableMicButton').addEventListener('click', enableMicrophone);

        function floatTo16BitPCM(input) {
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output;
        }

        function float32ToInt16PCM(float32Array) {
    const int16Array = new Int16Array(float32Array.length);
    for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return int16Array;
}

function processRawPCM(arrayBuffer) {
    const audioData = new Int16Array(arrayBuffer);
    const buffer = audioContext.createBuffer(1, audioData.length, SAMPLE_RATE);
    const channel = buffer.getChannelData(0);
    for (let i = 0; i < audioData.length; i++) {
        channel[i] = audioData[i] / 32768;
    }
    const source = audioContext.createBufferSource();
    source.buffer = buffer;
    source.connect(audioContext.destination);
    source.start();
}


        async function startAudio() {
            try {
                // Initialize WebSocket
                // ws = new WebSocket('wss://localhost:443');
                ws = new WebSocket('wss://localhost:443');
                // ws = new WebSocket('wss://23f44c5bb45e.ngrok-free.app');

                ws.onopen = async () => {
                    // document.getElementById("status").textContent = "Connected";
                                        statusEl.textContent = 'Connected';
                    startBtn.disabled = true;
                    stopBtn.disabled = false;

                    globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });

                    const source = audioContext.createMediaStreamSource(globalStream);
                    processor = audioContext.createScriptProcessor(4096, 1, 1);

                    source.connect(processor);
                    processor.connect(audioContext.destination);

                    processor.onaudioprocess = (e) => {
                        const floatSamples = e.inputBuffer.getChannelData(0);
                        const int16 = float32ToInt16PCM(floatSamples);
                        ws.send(int16.buffer); // Send to server
                    };
                };

                ws.onmessage = async (event) => {
                    if (event.data instanceof Blob) {
                        const arrayBuffer = await event.data.arrayBuffer();
                        processRawPCM(arrayBuffer);
                    }
                };

                ws.onclose = () => {
                    console.log('Disconnected from WebSocket server');
                    statusEl.textContent = 'Disconnected';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    cleanupAudio();
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    statusEl.textContent = 'Error';
                };

                // Initialize AudioContext
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                nextTime = audioContext.currentTime; // Initialize playback time
            } catch (error) {
                console.error('Error starting audio:', error);
                statusEl.textContent = 'Error';
            }
        }

        function processRawPCM(arrayBuffer) {
            try {
                // Convert raw PCM (linear16) to AudioBuffer
                const audioData = new Int16Array(arrayBuffer);
                const audioBuffer = audioContext.createBuffer(1, audioData.length, SAMPLE_RATE);
                const channelData = audioBuffer.getChannelData(0);

                // Convert int16 to float32
                for (let i = 0; i < audioData.length; i++) {
                    channelData[i] = audioData[i] / 32768; // Normalize to -1.0 to 1.0
                }

                queueAudio(audioBuffer);
            } catch (error) {
                console.error('Error processing PCM audio:', error);
            }
        }

        function queueAudio(audioBuffer) {
            audioQueue.push(audioBuffer);
            if (!isPlaying) {
                playNext();
            }
        }

        function playNext() {
            if (audioQueue.length === 0) {
                isPlaying = false;
                return;
            }

            isPlaying = true;
            const buffer = audioQueue.shift();
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);

            // Schedule playback to avoid gaps
            const bufferDuration = buffer.length / SAMPLE_RATE;
            source.start(nextTime);
            nextTime += bufferDuration; // Schedule next buffer

            source.onended = () => {
                // Only proceed to next buffer if queue isn't empty
                if (audioQueue.length > 0) {
                    playNext();
                } else {
                    isPlaying = false;
                }
            };
        }

        function cleanupAudio() {
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            audioQueue = [];
            isPlaying = false;
            nextTime = 0;
        }

        startBtn.addEventListener('click', startAudio);
        stopBtn.addEventListener('click', () => {
            if (ws) {
                ws.close();
            }
        });
